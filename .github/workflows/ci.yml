name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint + Test + Eval
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Ruff lint
        run: uv run ruff check .

      - name: Pytest
        run: uv run pytest --cov=src --cov-report=xml --cov-report=term --cov-fail-under=80

      - name: Run eval suite
        run: uv run python evals/runner.py
        continue-on-error: false

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.run_id }}
          path: coverage.xml

      - name: Governance check on PR
        if: github.event_name == 'pull_request'
        run: uv run python scripts/governance_check.py --base ${{ github.base_ref }}

  detect-secrets:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v3
      - run: uv run pip install detect-secrets
      - run: |
          if [ -f .secrets.baseline ]; then
            uv run detect-secrets scan --baseline .secrets.baseline
          else
            uv run detect-secrets scan --all-files
          fi
